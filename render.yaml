# ─────────────────────────────────────────────────────────────────────────────
# Render Blueprint — contractor-ops
#
# Services:
#   - web                 (Web Service, Docker, autoscaled, public)
#   - landing             (Static Site, free, CDN, public)
#   - public-api          (Web Service, Docker, autoscaled, public — Enterprise)
#   - worker              (Background Worker, Docker, single instance)
#   - clamav              (Private Service, image, persistent disk)
#   - unleash-eu          (Private Service, image — feature flags, EU region)
#   - unleash-me          (Private Service, image — feature flags, ME region)
#   - cloudflared         (Private Service, image — on-demand Zero Trust tunnel
#                          for Unleash admin UIs; SUSPEND by default, resume
#                          only when an operator needs access)
#   - cron-token-refresh   (Cron Job, every 15 min — calls web via private net)
#   - cron-data-purge      (Cron Job, daily 03:00 UTC — calls web via private net)
#   - cron-exchange-rates  (Cron Job, daily 06:00 UTC — calls web via private net)
#
# External (NOT managed by this Blueprint):
#   Neon Postgres (multi-region EU+ME), Upstash Redis + QStash, Cloudflare R2,
#   Resend, Sentry, Stripe, Cronitor.
#
# Web port: 3000 (NOT 10000 — Render blocks 10000 on the private network).
# Region: frankfurt (closest EU). ME tenants use DATABASE_URL_ME via Neon.
# ─────────────────────────────────────────────────────────────────────────────

previews:
  generation: automatic
  expireAfterDays: 7

# ── Shared environment variable groups ─────────────────────────────────────
# All non-secret, non-region-specific envs live here. Secrets stay sync: false
# on individual services and are filled in via Render dashboard.
envVarGroups:
  - name: app-shared
    envVars:
      # Runtime
      - key: NODE_ENV
        value: production
      - key: NEXT_TELEMETRY_DISABLED
        value: '1'
      - key: LOG_LEVEL
        value: info
      - key: DATA_HOSTING_REGION
        value: EU
      # Public app URLs — set after custom domain is bound in Render dashboard
      - key: PUBLIC_APP_URL
        sync: false
      - key: APP_URL
        sync: false
      - key: API_URL
        sync: false
      - key: BETTER_AUTH_URL
        sync: false
      - key: PORTAL_BASE_DOMAIN
        sync: false
      # Auth
      - key: BETTER_AUTH_SECRET
        sync: false
      # Public REST API (Enterprise) — HMAC secret used to derive API key hashes
      - key: API_KEY_HMAC_SECRET
        sync: false
      # Database (Neon, multi-region)
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_URL_EU
        sync: false
      - key: DATABASE_URL_ME
        sync: false
      # Storage (Cloudflare R2)
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET_NAME
        sync: false
      - key: R2_BUCKET_NAME_EU
        sync: false
      - key: R2_BUCKET_NAME_ME
        sync: false
      - key: R2_PUBLIC_URL
        sync: false
      # Email (Resend)
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_WEBHOOK_SECRET
        sync: false
      - key: EMAIL_FROM
        sync: false
      # Upstash Redis (rate limiting + cache)
      - key: UPSTASH_REDIS_REST_URL
        sync: false
      - key: UPSTASH_REDIS_REST_TOKEN
        sync: false
      # Upstash QStash (webhook queue)
      - key: QSTASH_TOKEN
        sync: false
      - key: QSTASH_CURRENT_SIGNING_KEY
        sync: false
      - key: QSTASH_NEXT_SIGNING_KEY
        sync: false
      # OAuth providers
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: MICROSOFT_CLIENT_ID
        sync: false
      - key: MICROSOFT_CLIENT_SECRET
        sync: false
      # Stripe
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_PRICE_STARTER
        sync: false
      - key: STRIPE_PRICE_PRO
        sync: false
      - key: STRIPE_PRICE_ENTERPRISE
        sync: false
      - key: STRIPE_PRICE_TOPUP_10
        sync: false
      - key: STRIPE_PRICE_TOPUP_25
        sync: false
      - key: STRIPE_PRICE_TOPUP_50
        sync: false
      # Vite SPA Stripe Price IDs — inlined at build time by Vite via
      # `import.meta.env`. Set in Render dashboard BEFORE the first build
      # of each environment or checkout URLs ship empty.
      - key: VITE_STRIPE_PRICE_STARTER
        sync: false
      - key: VITE_STRIPE_PRICE_PRO
        sync: false
      - key: VITE_STRIPE_PRICE_ENTERPRISE
        sync: false
      - key: VITE_STRIPE_PRICE_TOPUP_10
        sync: false
      - key: VITE_STRIPE_PRICE_TOPUP_25
        sync: false
      - key: VITE_STRIPE_PRICE_TOPUP_50
        sync: false
      # Encryption (AES-256-GCM)
      - key: BANK_ACCOUNT_ENCRYPTION_KEY
        sync: false
      - key: SLACK_TOKEN_ENCRYPTION_KEY
        sync: false
      # Government APIs
      - key: HMRC_ENV
        value: production
      - key: VIES_ENV
        value: production
      - key: HMRC_PLATFORM_VRN
        sync: false
      - key: HMRC_CLIENT_ID_SECRET_PATH
        value: hmrc/client_id
      - key: HMRC_CLIENT_SECRET_SECRET_PATH
        value: hmrc/client_secret
      # OCR (Claude Vision)
      - key: ANTHROPIC_API_KEY
        sync: false
      # Secret store (Infisical)
      - key: INFISICAL_SITE_URL
        value: https://app.infisical.com
      - key: INFISICAL_CLIENT_ID
        sync: false
      - key: INFISICAL_CLIENT_SECRET
        sync: false
      - key: INFISICAL_PROJECT_ID
        sync: false
      - key: INFISICAL_ENVIRONMENT
        value: production
      # Observability
      - key: SENTRY_DSN
        sync: false
      - key: AXIOM_TOKEN
        sync: false
      - key: AXIOM_DATASET
        value: contractor-ops
      - key: CRONITOR_API_KEY
        sync: false
      # Integrations (optional — leave blank to disable)
      - key: SLACK_CLIENT_ID
        sync: false
      - key: SLACK_CLIENT_SECRET
        sync: false
      - key: SLACK_SIGNING_SECRET
        sync: false
      - key: LINEAR_CLIENT_ID
        sync: false
      - key: LINEAR_CLIENT_SECRET
        sync: false
      - key: LINEAR_WEBHOOK_SECRET
        sync: false
      - key: JIRA_CLIENT_ID
        sync: false
      - key: JIRA_CLIENT_SECRET
        sync: false
      - key: NOTION_CLIENT_ID
        sync: false
      - key: NOTION_CLIENT_SECRET
        sync: false
      - key: CONFLUENCE_CLIENT_ID
        sync: false
      - key: CONFLUENCE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_CALENDAR_CLIENT_ID
        sync: false
      - key: GOOGLE_CALENDAR_CLIENT_SECRET
        sync: false
      - key: GOOGLE_WORKSPACE_CLIENT_ID
        sync: false
      - key: GOOGLE_WORKSPACE_CLIENT_SECRET
        sync: false
      - key: OUTLOOK_CLIENT_ID
        sync: false
      - key: OUTLOOK_CLIENT_SECRET
        sync: false
      - key: OUTLOOK_CALENDAR_CLIENT_ID
        sync: false
      - key: OUTLOOK_CALENDAR_CLIENT_SECRET
        sync: false
      - key: DOCUSIGN_CLIENT_ID
        sync: false
      - key: DOCUSIGN_CLIENT_SECRET
        sync: false
      - key: DOCUSIGN_WEBHOOK_SECRET
        sync: false
      - key: AUTENTI_CLIENT_ID
        sync: false
      - key: AUTENTI_CLIENT_SECRET
        sync: false
      - key: AUTENTI_WEBHOOK_SECRET
        sync: false
      # Storecove (Peppol / e-invoicing) webhook HMAC secret — verifies
      # inbound delivery-status callbacks (apps/api webhook route).
      - key: STORECOVE_WEBHOOK_SECRET
        sync: false
      - key: AZURE_BOT_APP_ID
        sync: false
      - key: AZURE_BOT_APP_SECRET
        sync: false
      # Feature flags (self-hosted Unleash, per region — see services below).
      # URLs use Render private-network hostnames; fill after first provisioning
      # with "http://<service>-XXXX:4242/api/". Tokens are created in Unleash
      # UI (Admin → API access → "server-side" token).
      - key: UNLEASH_URL_EU
        sync: false
      - key: UNLEASH_API_TOKEN_EU
        sync: false
      - key: UNLEASH_URL_ME
        sync: false
      - key: UNLEASH_API_TOKEN_ME
        sync: false
      - key: UNLEASH_APP_NAME
        value: contractor-ops
      - key: UNLEASH_ENVIRONMENT
        value: production
      # Cross-tenant admin shell gate (apps/web/src/lib/admin-auth.ts).
      # UUID of the dedicated operator org whose members hold the
      # `platform_operator` role; /admin/* refuses access unless the active
      # session's organizationId matches AND member.role === 'platform_operator'.
      - key: PLATFORM_OPERATOR_ORG_ID
        sync: false
      # Cloudflare Turnstile signup bot protection
      # (packages/auth/src/turnstile.ts). Fails closed in production when
      # TURNSTILE_SECRET_KEY is missing. VITE_TURNSTILE_SITE_KEY is the
      # public site key inlined into the SPA bundle at build time.
      - key: TURNSTILE_SECRET_KEY
        sync: false
      - key: VITE_TURNSTILE_SITE_KEY
        sync: false
      # Comma-separated CIDR list (or proxy-addr keywords: loopback,
      # linklocal, uniquelocal) the rate-limit middleware trusts when
      # walking X-Forwarded-For (apps/api/src/plugins/rate-limit.ts).
      # Render default: "loopback,linklocal,uniquelocal". When fronted by
      # Cloudflare, switch to Cloudflare's published IP ranges.
      - key: TRUSTED_PROXIES
        sync: false

  # Build-time only — Sentry source map upload (used in Docker build args).
  - name: build-secrets
    envVars:
      - key: SENTRY_ORG
        sync: false
      - key: SENTRY_PROJECT
        sync: false
      - key: SENTRY_AUTH_TOKEN
        sync: false

services:
  # ── Web Service: Headless CMS + public blog (apps/cms) ──────────────────
  # Hosts the Payload CMS admin at /admin and the public blog frontend on
  # blog.contractor-ops.io. Connects to a dedicated Neon Postgres database
  # via CMS_DATABASE_URL (isolated from the multi-region app DBs).
  - type: web
    name: cms
    runtime: docker
    region: frankfurt
    plan: starter
    branch: main
    autoDeploy: true
    # No PR previews: a preview instance would inherit app-shared (production
    # CMS_DATABASE_URL + secrets). Disable until an isolated preview env group
    # with its own DB exists.
    previews:
      generation: off
    dockerfilePath: ./apps/cms/Dockerfile
    dockerContext: .
    dockerCommand: node apps/cms/server.js
    healthCheckPath: /api/users/me
    # Apply Payload v3 migrations against CMS_DATABASE_URL before the new
    # revision starts taking traffic. Failure aborts the deploy and the
    # previous revision keeps serving. Wraps `payload migrate` via dotenv.
    preDeployCommand: pnpm --filter @contractor-ops/cms run migrate
    scaling:
      minInstances: 1
      maxInstances: 3
      targetMemoryPercent: 75
      targetCPUPercent: 70
    envVars:
      - fromGroup: app-shared
      - key: PORT
        value: '3000'
      - key: HOSTNAME
        value: 0.0.0.0
      # CMS-specific Postgres (separate Neon project; NOT the app DBs)
      - key: CMS_DATABASE_URL
        sync: false
      # Payload session/encryption secret (rotate by re-issuing logins)
      - key: PAYLOAD_SECRET
        sync: false
      # First-run admin seed credentials — consumed by `pnpm seed:admin`
      - key: CMS_ADMIN_EMAIL
        sync: false
      - key: CMS_ADMIN_PASSWORD
        sync: false
      # HMAC shared secret for the legal-documents revalidation webhook
      # (must match CMS_WEBHOOK_SECRET on the `web` service)
      - key: CMS_WEBHOOK_SECRET
        sync: false
      # Public origin (canonical URLs, OG image refs)
      - key: CMS_PUBLIC_URL
        sync: false
      # Fastify API origin — apps/cms posts the legal-doc revalidation
      # webhook to POST {API_URL}/revalidate-legal.
      - key: API_URL
        sync: false

  # ── Static Site: marketing landing page ─────────────────────────────────
  - type: web
    name: landing
    runtime: static
    region: frankfurt
    branch: main
    autoDeploy: true
    buildCommand: |
      corepack enable && corepack prepare pnpm@10.33.2 --activate
      pnpm install --frozen-lockfile --filter @contractor-ops/landing...
      pnpm --filter @contractor-ops/landing build
    staticPublishPath: ./apps/landing/out
    # Security headers for the static landing export. apps/landing uses
    # `output: 'export'` which means Next.js never invokes `headers()` at
    # request time — this block is the SINGLE SOURCE OF TRUTH for headers
    # served to landing visitors. Kept in sync with apps/web/next.config.ts.
    headers:
      - path: /*
        name: Strict-Transport-Security
        value: max-age=63072000; includeSubDomains; preload
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: Cross-Origin-Opener-Policy
        value: same-origin
      - path: /*
        name: Cross-Origin-Resource-Policy
        value: same-site
      # Cross-Origin-Embedder-Policy: 'credentialless' is the COEP mode
      # compatible with cross-origin iframes that don't ship CORP headers.
      # Landing has no embeds today; matches web app for parity.
      - path: /*
        name: Cross-Origin-Embedder-Policy
        value: credentialless
      - path: /*
        name: Permissions-Policy
        value: 'camera=(), microphone=(), geolocation=(), interest-cohort=(), payment=(), fullscreen=(self)'
      # Landing CSP starter: keeps 'unsafe-inline' for script-src + style-src
      # because output:'export' produces static HTML — request-time nonces
      # cannot be plumbed. Tighten in a follow-up if landing migrates to a
      # runtime serving layer (Cloudflare Worker / Render Node) that can
      # inject per-request nonces.
      - path: /*
        name: Content-Security-Policy
        value: "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https://*.r2.cloudflarestorage.com; connect-src 'self' https://*.sentry.io https://*.ingest.sentry.io; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none';"
    # NEXT_PUBLIC_* are inlined into the static export at build time (Next.js
    # output:'export'). Set in the Render dashboard BEFORE the first build of
    # each environment — otherwise PostHog analytics ship dead and the blog /
    # CMS + canonical URLs fall back to their hard-coded production hosts
    # (apps/landing/src/lib/{posthog.tsx,cms.ts} + blog/changelog RSS routes).
    envVars:
      - key: NEXT_PUBLIC_POSTHOG_KEY
        sync: false
      - key: NEXT_PUBLIC_POSTHOG_HOST
        sync: false
      - key: NEXT_PUBLIC_CMS_URL
        sync: false
      - key: NEXT_PUBLIC_LANDING_URL
        sync: false

  # ── Web Service: Public REST API (Enterprise) ──────────────────────────
  # Hono + tRPC caller, OpenAPI at /v1/docs, scoped API-key auth.
  # Mount on a dedicated subdomain (e.g. api.contractor-ops.com) — bind that
  # custom domain on this service, not on `web`.
  - type: web
    name: public-api
    runtime: docker
    region: frankfurt
    plan: standard
    branch: main
    autoDeploy: true
    # No PR previews: a preview instance would inherit app-shared (production
    # DATABASE_URL_EU/ME + secrets). Disable until an isolated preview env
    # group with its own DB exists.
    previews:
      generation: off
    dockerfilePath: ./apps/public-api/Dockerfile
    dockerContext: .
    dockerCommand: node apps/public-api/dist/index.js
    healthCheckPath: /v1/health
    scaling:
      minInstances: 2
      maxInstances: 6
      targetMemoryPercent: 75
      targetCPUPercent: 70
    envVars:
      - fromGroup: app-shared
      - fromGroup: build-secrets
      - key: PORT
        value: '3000'
      - key: HOSTNAME
        value: 0.0.0.0
      - key: PUBLIC_API_PORT
        value: '3000'

  # ── Private Service: ClamAV virus scanner ───────────────────────────────
  # plan: standard — ClamAV needs ~1GB RAM to load signatures into memory;
  # starter (512MB) OOMs once the signature DB hits typical size (~300MB on
  # disk + ~700MB loaded). See https://docs.clamav.net/manual/Installing/Packages.html
  - type: pserv
    name: clamav
    runtime: image
    region: frankfurt
    plan: standard
    # Disable PR previews — provisioning a ClamAV instance per PR is wasteful
    # (stateful, slow signature download, costs money). Preview envs can
    # reach the production clamav over Render's private network or use a
    # feature flag to skip scanning in preview envs.
    previews:
      generation: off
    image:
      url: docker.io/clamav/clamav:stable
    disk:
      name: clamav-data
      mountPath: /var/lib/clamav
      sizeGB: 5
    envVars:
      - key: CLAMAV_NO_FRESHCLAMD
        value: 'false'
      - key: CLAMAV_NO_CLAMD
        value: 'false'
      - key: CLAMD_STARTUP_TIMEOUT
        value: '180'

  # ── Private Service: Unleash (EU region — feature flags) ───────────────
  # Self-hosted Unleash OSS. Reachable only over Render's private network —
  # apps/web and apps/public-api call it by hostname (UNLEASH_URL_EU in
  # app-shared). Admin UI (root path) is reached via the cloudflared tunnel
  # below, which is suspended by default.
  #
  # DATABASE_URL must be a dedicated Postgres (separate Neon DB recommended —
  # does NOT share schema with the main app DB). Unleash manages its own
  # migrations on startup.
  - type: pserv
    name: unleash-eu
    runtime: image
    region: frankfurt
    plan: starter
    previews:
      generation: off
    image:
      url: docker.io/unleashorg/unleash-server:7
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_SSL
        value: 'true'
      - key: LOG_LEVEL
        value: info
      # Bootstrap token — create via `openssl rand -hex 32 | sed 's/^/*:*./'`
      # (format: "<env>:<project>.<secret>"). Only used on the very first boot
      # to seed a root admin API token; rotate via Unleash UI after that.
      - key: INIT_ADMIN_API_TOKENS
        sync: false

  # ── Private Service: Unleash (ME region — feature flags) ───────────────
  # Separate instance so ME-tenant flag evaluations never leave an EU-local
  # wrapper's short-circuit. Deployed in frankfurt (Render has no ME region);
  # data-residency is enforced at the DB layer (Neon ME) + code short-circuit
  # (see packages/api jurisdiction guard in the feature-flag wrapper).
  - type: pserv
    name: unleash-me
    runtime: image
    region: frankfurt
    plan: starter
    previews:
      generation: off
    image:
      url: docker.io/unleashorg/unleash-server:7
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_SSL
        value: 'true'
      - key: LOG_LEVEL
        value: info
      - key: INIT_ADMIN_API_TOKENS
        sync: false

  # ── Private Service: Cloudflare Tunnel (on-demand admin UI access) ─────
  # Zero Trust tunnel exposing the Unleash admin UIs behind Cloudflare Access
  # (Google Workspace SSO + MFA). NOT exposed to the public internet — only
  # users on the Access application policy reach the hostnames configured
  # in the tunnel (e.g. unleash-eu.internal.contractor-ops.com).
  #
  # On-demand billing pattern:
  #   1. Tunnel config (Cloudflare dashboard) maps hostnames →
  #      http://unleash-eu:4242 and http://unleash-me:4242 over Render's
  #      private network.
  #   2. This service is SUSPENDED by default. While suspended = $0 billing.
  #   3. When an operator needs admin access: resume via Render Dashboard
  #      or API (`POST /v1/services/<id>/resume`). ~15s cold start.
  #   4. Suspend again after use.
  # See docs/DEPLOYMENT-RENDER.md §"Cloudflare Tunnel (on-demand)".
  #
  # Cloudflare Tunnel itself is free. Cloudflare Access free tier covers
  # up to 50 users. Cost = only the Render starter pserv while running.
  - type: pserv
    name: cloudflared
    runtime: image
    region: frankfurt
    plan: starter
    previews:
      generation: off
    image:
      # Pin exact version — bump manually after reviewing changelog at
      # https://github.com/cloudflare/cloudflared/releases. Never use `latest`
      # on security-critical ingress.
      url: docker.io/cloudflare/cloudflared:2026.3.0
    dockerCommand: tunnel --no-autoupdate --metrics 0.0.0.0:2000 run
    envVars:
      # Generate in Cloudflare Zero Trust dashboard:
      #   Networks → Tunnels → Create a tunnel → choose "Cloudflared" →
      #   copy the token (single line starting with "ey..."). Paste here.
      - key: TUNNEL_TOKEN
        sync: false

  # ── Web Service: Fastify API ────────────────────────────────────────────
  - type: web
    name: api-server
    runtime: docker
    region: frankfurt
    plan: standard
    branch: main
    autoDeploy: true
    # No PR previews: a preview instance would inherit app-shared (production
    # DATABASE_URL_EU/ME + secrets). Disable until an isolated preview env
    # group with its own DB exists.
    previews:
      generation: off
    dockerfilePath: ./apps/api/Dockerfile
    dockerContext: .
    dockerCommand: node apps/api/dist/index.js
    # Shallow liveness probe (apps/api/src/routes/health.ts `/ready`) — returns
    # 200 as long as the process is up. The deep `/health` probe 503s on
    # Redis/QStash/R2/backpressure degradation; using it here would make Render
    # cycle the whole fleet during a downstream incident. `/health` stays for
    # dashboards + alerting.
    healthCheckPath: /ready
    # Apply Prisma migrations to every configured region before the new revision
    # takes traffic. A non-zero exit aborts the rollout and the previous revision
    # keeps serving. migrate-all-regions.ts prefers each region's DIRECT_URL_*
    # (unpooled Neon endpoint) so migration advisory locks don't hang on the
    # PgBouncer pooler.
    preDeployCommand: pnpm --filter @contractor-ops/db run db:migrate:all
    scaling:
      minInstances: 2
      maxInstances: 6
      targetMemoryPercent: 75
      targetCPUPercent: 70
    envVars:
      - fromGroup: app-shared
      - fromGroup: build-secrets
      - key: PORT
        value: '4000'
      - key: HOST
        value: 0.0.0.0
      # Cross-subdomain Better Auth posture (plan.md Step 3 + Step 16).
      # AUTH_COOKIE_DOMAIN forces `Domain=.contractor-ops.com; SameSite=None;
      # Secure` once the cutover DNS swap binds api.contractor-ops.com here.
      - key: AUTH_COOKIE_DOMAIN
        sync: false
      - key: AUTH_COOKIE_SAME_SITE
        sync: false
      - key: APP_URL
        sync: false
      - key: API_URL
        sync: false
      # ClamAV virus scanner (private service `clamav` above). Host auto-wired
      # from the pserv over Render's private network; port is clamd's fixed
      # 3310. Without these, virus-scanner.ts (packages/api) falls back to the
      # 127.0.0.1:3310 dev default and every production scan throws.
      - key: CLAMAV_HOST
        fromService:
          type: pserv
          name: clamav
          property: host
      - key: CLAMAV_PORT
        value: '3310'

  # ── Background Worker: in-process cron scheduler (node-cron) ────────────
  # Owns every schedule in-process. Job binding table:
  # apps/cron-worker/src/jobs/registry.ts.
  - type: worker
    name: cron-worker
    runtime: docker
    region: frankfurt
    plan: starter
    branch: main
    autoDeploy: true
    # MANDATORY no PR previews: a preview worker inherits app-shared (production
    # DATABASE_URL_EU/ME + secrets) and would run the daily data-purge job — the
    # load-bearing hard-delete path — against the production databases. Never
    # spawn this per PR.
    previews:
      generation: off
    dockerfilePath: ./apps/cron-worker/Dockerfile
    dockerContext: .
    dockerCommand: node apps/cron-worker/dist/index.js
    envVars:
      - fromGroup: app-shared
      - fromGroup: build-secrets
