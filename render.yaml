  # ── Static Site: Vite SPA (replaces apps/web's [locale]/** pages) ───────
  # Bind the custom domain `app-next.contractor-ops.com` in the Render
  # dashboard before first deploy. Renamed to `app.contractor-ops.com` at
  # cutover (plan.md Step 16).
  - type: web
    name: web-vite
    runtime: static
    region: frankfurt
    branch: main
    autoDeploy: true
    buildCommand: pnpm install --frozen-lockfile --ignore-scripts && pnpm --filter @contractor-ops/web-vite build
    publishPath: ./apps/web-vite/dist
    pullRequestPreviewsEnabled: true
    # Hashed asset filenames get immutable caching; the un-hashed
    # index.html must NOT be cached so a deploy that ships a new asset
    # hash takes effect on the next page load.
    headers:
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
      - path: /index.html
        name: Cache-Control
        value: no-cache, no-store, must-revalidate
      # CSP — single source of truth for the SPA on the wire.
      # Keep this string byte-identical to the `<meta http-equiv="Content-Security-Policy">`
      # tag in apps/web-vite/index.html (the meta is the local-preview fallback
      # for when no edge is in front of the build).
      #   connect-src:
      #     - https://*.contractor-ops.com covers BOTH api.contractor-ops.com (prod)
      #       and api-next.contractor-ops.com (staging/UAT) without rebuilding the
      #       CSP per environment. Wider wildcards (e.g. https:) were rejected.
      #     - eu.i.posthog.com / eu-assets.i.posthog.com for PostHog browser SDK
      #       event ingestion + feature-flag config fetch.
      #   frame-src:
      #     - DocuSign + Autenti host the embedded signing UI iframes
      #       (apps/web-vite/src/components/{portal,contracts}/...embedded-signing-modal.tsx).
      #     - r2.cloudflarestorage.com for the signed-URL PDF preview iframe
      #       (intake-detail-pdf-pane.tsx).
      #     - challenges.cloudflare.com for the Turnstile widget on register-form.tsx.
      #   script-src adds challenges.cloudflare.com to load the Turnstile bootstrap.
      #   worker-src 'self' blob: covers PostHog's session-recording worker and any
      #     PDF.js worker shipped via dynamic import.
      #   style-src 'unsafe-inline' is required by Tailwind's runtime style injection
      #     and shadcn primitives. Documented residual risk; would require a build-time
      #     style-hash extractor to remove, which Vite does not provide for static builds.
      #   report-uri / report-to: violations POST to api.contractor-ops.com/csp-report
      #     (apps/api/src/routes/csp-report.ts) — exempt from the CSRF-origin guard at
      #     apps/api/src/plugins/csrf-origin.ts:32. The `Report-To` header below ships
      #     the matching group definition; `report-to` falls back to `report-uri` on
      #     browsers that haven't shipped the Reporting API v1 yet.
      - path: /*
        name: Content-Security-Policy
        value: "default-src 'self'; script-src 'self' 'wasm-unsafe-eval' https://*.sentry-cdn.com https://challenges.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https://*.r2.cloudflarestorage.com https://*.googleusercontent.com https://graph.microsoft.com; connect-src 'self' https://*.contractor-ops.com https://*.sentry.io https://*.ingest.sentry.io https://eu.i.posthog.com https://eu-assets.i.posthog.com https://*.r2.cloudflarestorage.com; frame-src 'self' https://*.docusign.net https://*.docusign.com https://*.autenti.com https://*.r2.cloudflarestorage.com https://challenges.cloudflare.com; worker-src 'self' blob:; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'; report-uri https://api.contractor-ops.com/csp-report; report-to csp-endpoint"
      # Reporting API v1 group definition. Must be delivered on the wire — the
      # spec ignores Report-To when set via <meta>. Keep the endpoint URL in
      # lockstep with the `report-uri` directive above and apps/api/src/lib/csp.ts.
      - path: /*
        name: Report-To
        value: '{"group":"csp-endpoint","max_age":10886400,"endpoints":[{"url":"https://api.contractor-ops.com/csp-report"}]}'
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
      - path: /*
        name: Strict-Transport-Security
        value: max-age=63072000; includeSubDomains; preload
      # `credentialless` is the lenient COEP mode that lets cross-origin
      # iframes without CORP headers still load (DocuSign / Autenti
      # embedded signing, R2 PDF previews, Cloudflare Turnstile) — strict
      # `require-corp` would break those embeds. If COEP-violation reports
      # appear in /csp-report, narrow to per-embed CORP headers and
      # consider tightening to `require-corp`.
      - path: /*
        name: Cross-Origin-Embedder-Policy
        value: credentialless
      # Permissions-Policy — top-level capability lockdown. Same posture as
      # the API helmet config (apps/api/src/plugins/helmet.ts) for the
      # directives that the SPA never legitimately uses.
      #
      # Notably absent: camera + microphone. DocuSign / Autenti embedded
      # signing iframes need both for ID-verification flows and the
      # iframe-level `allow="camera; microphone"` attribute can only grant
      # what the top-level policy already permits. Leaving these on the
      # browser default (= allowed for same-origin + iframes with allow=)
      # keeps signing working without exposing the SPA's top-level scope.
      - path: /*
        name: Permissions-Policy
        value: "geolocation=(), interest-cohort=(), payment=(), fullscreen=(self), accelerometer=(), gyroscope=(), magnetometer=(), usb=(), midi=(), serial=(), bluetooth=()"
    # SPA fallback — every unknown path serves index.html so React Router
    # owns client-side routing (`/en/contractors/123` reloads cleanly).
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      # Source-map upload to Sentry runs in the Vite build (@sentry/vite-plugin
      # early-returns when SENTRY_AUTH_TOKEN is unset — see apps/web-vite/
      # vite.config.mjs). Pulling the build-secrets group keeps SENTRY_ORG /
      # SENTRY_PROJECT / SENTRY_AUTH_TOKEN aligned with api-server.
      - fromGroup: build-secrets
      # VITE_* envs are inlined at build time. Fill from Render dashboard
      # before the first build of each environment.
      - key: VITE_API_URL
        sync: false
      - key: VITE_APP_URL
        sync: false
      - key: VITE_SENTRY_DSN
        sync: false
      - key: VITE_POSTHOG_KEY
        sync: false
      - key: VITE_POSTHOG_HOST
        sync: false
