name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  TURBO_TELEMETRY_DISABLED: 1
  SKIP_ENV_VALIDATION: true

jobs:
  ci:
    name: Lint, Typecheck & Test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      # Throwaway Postgres 17 (matches the prod engine) the migration↔schema
      # drift check replays every migration into. It is reset by the check and
      # holds no real data — never point MIGRATE_SHADOW_DATABASE_URL at a
      # regional database.
      migrate-shadow:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: migrate_shadow
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history so check:wiki-brain can diff against the PR/branch base
          # (origin/main merge-base) and flag NEW doc drift. Shallow clone makes
          # the drift gate a no-op.
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify committed Prisma client matches schema
        run: pnpm --filter @contractor-ops/db run db:check-drift

      # Migrations must reproduce the schema (guards the "model in schema, no
      # CREATE TABLE migration" class). The `migrate-shadow` service above
      # provides MIGRATE_SHADOW_DATABASE_URL so the check RUNS TO COMPLETION and
      # prints its precise drift diff — no longer a silent WARN-skip on a missing
      # shadow.
      #
      # REPORT-ONLY (continue-on-error) for now: the full --from-migrations replay
      # applies cleanly, but the diff still reports a large PRE-EXISTING accumulated
      # db-push drift tail (generated searchVector columns, PK drops, dropped
      # uniques, additive enum variants/columns) that is unsafe to reconstruct
      # blind, so the script exits 1 and would brick every unrelated PR as a hard
      # gate. FLIP to hard-gate (drop continue-on-error) once that drift tail is
      # reconciled in a dedicated migration change set.
      - name: Verify migrations reproduce the schema (report-only until drift tail reconciled)
        run: pnpm --filter @contractor-ops/db run db:check-migration-drift
        continue-on-error: true
        env:
          MIGRATE_SHADOW_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/migrate_shadow

      - name: Format check (biome)
        run: pnpm run format:check

      - name: Lint
        run: pnpm run lint:ci

      - name: No raw process.env outside allowlist (ratchet)
        run: pnpm run check:no-process-env

      - name: Lint Prisma schema for tenant scoping (FOUND6-01 / P27)
        run: pnpm run lint:schema

      - name: Lint logger call sites for body-redaction drift (FOUND6-02 / P28)
        run: pnpm run lint:logs

      - name: Lint IdP adapter OAuth scopes for typed-const drift (IDP-14 / D-15)
        run: pnpm run lint:scopes

      - name: Verify i18n message-key parity (FOUND6-03 / P29)
        run: pnpm run i18n:parity

      # Strict gate: every t(`key`) / t(`prefix.${…}`) reference in
      # apps/web source must resolve to a leaf (or namespace) in every
      # locale JSON. Fails CI on the first missing key — prevents
      # runtime MISSING_MESSAGE bugs reaching users.
      - name: Verify i18n source-code ↔ locale coverage
        run: pnpm run i18n:code-coverage

      # Advisory: surfaces untranslated values (en-byte-identical in
      # non-en locales) and ICU placeholder drift. Doesn't fail the
      # build — there's a ~99-entry intentional brand/legal-name
      # floor — but the report is captured per-run for review.
      - name: i18n quality audit (advisory)
        run: pnpm run i18n:quality
        continue-on-error: true

      - name: Build packages
        run: pnpm run build

      # Typecheck the whole workspace with tsc (CI-canonical). This is the
      # first CI gate on apps/web-vite — `vite build` strips types via esbuild,
      # so without this step ~217k LOC of the largest app ships unchecked.
      # Depends on the turbo `i18n:types` task (generated SPA message types),
      # which the Build step above has already produced + cached.
      - name: Typecheck (tsc — CI-canonical)
        run: pnpm run typecheck

      - name: Test
        run: pnpm run test

      - name: Dependency audit (informational)
        run: pnpm audit --audit-level moderate
        continue-on-error: true

  bundle-size:
    name: Bundle size budget (C.6.a)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [ci]
    # Gate every PR + push so a SPA bundle regression surfaces before merge.
    # Budgets live in apps/web-vite/.size-limit.json.
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build SPA
        run: pnpm --filter=@contractor-ops/web-vite run build

      - name: Enforce bundle-size budgets
        run: pnpm --filter=@contractor-ops/web-vite run size

  secrets-scan:
    name: Gitleaks (secret scan)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml

  legal-gate-production:
    name: Legal Gate — production deploy (LEGAL-02)
    runs-on: ubuntu-latest
    # Only blocks production deploys on main. PRs and non-main branches
    # can have PENDING disclaimers without failing CI.
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [ci]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Assert no PENDING disclaimers (LEGAL-02)
        run: node scripts/check-legal-gate.mjs
