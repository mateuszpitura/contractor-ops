name: CI

on:
  push:
    branches: [main, v2]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  TURBO_TELEMETRY_DISABLED: 1
  SKIP_ENV_VALIDATION: true

jobs:
  ci:
    name: Lint, Typecheck & Test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify committed Prisma client matches schema
        run: pnpm --filter @contractor-ops/db run db:check-drift

      - name: Format check (biome)
        run: pnpm run format:check

      - name: Lint
        run: pnpm run lint:ci

      - name: No raw process.env outside allowlist (ratchet)
        run: pnpm run check:no-process-env

      - name: Lint Prisma schema for tenant scoping (FOUND6-01 / P27)
        run: pnpm run lint:schema

      - name: Lint logger call sites for body-redaction drift (FOUND6-02 / P28)
        run: pnpm run lint:logs

      - name: Verify i18n message-key parity (FOUND6-03 / P29)
        run: pnpm run i18n:parity

      # Strict gate: every t(`key`) / t(`prefix.${…}`) reference in
      # apps/web source must resolve to a leaf (or namespace) in every
      # locale JSON. Fails CI on the first missing key — prevents
      # runtime MISSING_MESSAGE bugs reaching users.
      - name: Verify i18n source-code ↔ locale coverage
        run: pnpm run i18n:code-coverage

      # Advisory: surfaces untranslated values (en-byte-identical in
      # non-en locales) and ICU placeholder drift. Doesn't fail the
      # build — there's a ~99-entry intentional brand/legal-name
      # floor — but the report is captured per-run for review.
      - name: i18n quality audit (advisory)
        run: pnpm run i18n:quality
        continue-on-error: true

      - name: Build packages
        run: pnpm run build

      - name: Test
        run: pnpm run test

      - name: Dependency audit (informational)
        run: pnpm audit --audit-level moderate
        continue-on-error: true

  e2e-a11y:
    name: E2E — axe-core a11y gate (C.4)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [ci]
    # Gate every PR + every push to main/v2. Doc-only PRs that don't touch
    # apps/web still run this — the cost is one cached install + a single
    # Chromium binary, in exchange for catching a11y regressions from any
    # path (theme tweaks, new components, dep bumps).
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: pnpm --filter=@contractor-ops/web exec playwright install --with-deps chromium

      - name: Build web app
        run: pnpm --filter=@contractor-ops/web run build

      - name: Start web app
        run: pnpm --filter=@contractor-ops/web run start &
        env:
          PORT: 3000

      - name: Wait for app to be reachable
        run: npx --yes wait-on http://localhost:3000 --timeout 120000

      - name: Run axe-core a11y gate
        run: pnpm --filter=@contractor-ops/web run test:a11y
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:3000
          # E2E_EMAIL / E2E_PASSWORD intentionally unset on PRs without
          # secret access — specs skip gracefully (matches the functional
          # global-setup contract). Repo secrets gate full coverage on
          # main + protected branches; opt-in via repo settings.
          E2E_EMAIL: ${{ secrets.E2E_EMAIL }}
          E2E_PASSWORD: ${{ secrets.E2E_PASSWORD }}

      - name: Upload Playwright HTML report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-a11y-report
          path: apps/web/playwright-report/
          retention-days: 14

  secrets-scan:
    name: Gitleaks (secret scan)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml

  legal-gate-production:
    name: Legal Gate — production deploy (LEGAL-02)
    runs-on: ubuntu-latest
    # Only blocks production deploys on main. PRs and non-main branches
    # can have PENDING disclaimers without failing CI.
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [ci]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Assert no PENDING disclaimers (LEGAL-02)
        run: |
          node --input-type=module << 'EOF'
          import { getAllPending } from './packages/validators/src/legal/signoff-registry.js';
          const pending = getAllPending();
          if (pending.length > 0) {
            console.error('');
            console.error('╔══════════════════════════════════════════════════════════════╗');
            console.error('║  LEGAL-02: Production deploy BLOCKED                         ║');
            console.error('╚══════════════════════════════════════════════════════════════╝');
            console.error('');
            console.error('The following disclaimer keys have status PENDING:');
            pending.forEach(k => console.error(`  - ${k}`));
            console.error('');
            console.error('To unblock: submit a PR updating signoff-registry.json to set');
            console.error('each key to APPROVED with approvedBy + approvedAt + approverRole.');
            console.error('The PR requires @contractor-ops/legal-platform review (CODEOWNERS).');
            process.exit(1);
          }
          console.log(`Legal gate: all ${pending.length === 0 ? Object.keys(await import('./packages/validators/src/legal/signoff-registry.json', {with:{type:"json"}}).then(m=>m.default)).length : pending.length} disclaimers APPROVED ✓`);
          EOF
