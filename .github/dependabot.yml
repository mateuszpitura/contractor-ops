version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Warsaw"
    open-pull-requests-limit: 10
    groups:
      production-dependencies:
        dependency-type: "production"
      development-dependencies:
        dependency-type: "development"
      security-updates:
        applies-to: "security-updates"
    labels:
      - "dependencies"
      - "deps:npm"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Warsaw"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "deps:actions"
    commit-message:
      prefix: "chore(ci)"
      include: "scope"

  # Daily channel for security-only updates
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "daily"
    open-pull-requests-limit: 20
    labels:
      - "dependencies"
      - "security"
    allow:
      - dependency-type: "all"
    commit-message:
      prefix: "fix(deps)"
      include: "scope"
    # Note: Dependabot security updates run on this schedule but only PR when
    # an advisory matches. The weekly job above handles routine bumps.
