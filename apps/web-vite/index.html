<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>contractor-ops</title>

    <!--
      Local-preview CSP fallback. Render's static-site headers (render.yaml,
      web-vite service block) ship the canonical policy on the wire; this
      <meta> tag exists only so `pnpm --filter @contractor-ops/web-vite preview`
      (and any other edgeless serve) loads without CSP violations.

      MUST stay byte-identical to the render.yaml value — same connect-src,
      same frame-src, same script-src, same worker-src. If you tighten one,
      tighten the other.

      Directive notes live alongside the render.yaml definition.
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'wasm-unsafe-eval' https://*.sentry-cdn.com https://challenges.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https://*.r2.cloudflarestorage.com https://*.googleusercontent.com https://graph.microsoft.com; connect-src 'self' https://*.contractor-ops.com https://*.sentry.io https://*.ingest.sentry.io https://eu.i.posthog.com https://eu-assets.i.posthog.com https://*.r2.cloudflarestorage.com; frame-src 'self' https://*.docusign.net https://*.docusign.com https://*.autenti.com https://*.r2.cloudflarestorage.com https://challenges.cloudflare.com; worker-src 'self' blob:; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'"
    />
    <!--
      Permissions-Policy local-preview fallback. Render's static-site headers
      (render.yaml, web-vite block) ship the canonical policy on the wire.
      Camera + microphone deliberately absent so DocuSign / Autenti embedded
      signing iframes can request them via the iframe-level `allow=` attribute.
    -->
    <meta
      http-equiv="Permissions-Policy"
      content="geolocation=(), interest-cohort=(), payment=(), fullscreen=(self), accelerometer=(), gyroscope=(), magnetometer=(), usb=(), midi=(), serial=(), bluetooth=()"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
