# Minimal Loki config for dev — single-binary mode, filesystem-backed.
# Not suitable for production (no replication, no object storage).

auth_enabled: false

server:
  http_listen_port: 3100
  grpc_listen_port: 9096

common:
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1
  ring:
    instance_addr: 127.0.0.1
    kvstore:
      store: inmemory

schema_config:
  configs:
    - from: 2020-05-15
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

# Be friendly about cardinality — local dev rarely needs tight quotas, and
# the Pino transport batches a label per service which can easily exceed
# the upstream defaults on a chatty start-up burst.
limits_config:
  reject_old_samples: true
  reject_old_samples_max_age: 168h
  allow_structured_metadata: true
  volume_enabled: true
  max_label_value_length: 4096
  max_label_name_length: 1024
  max_label_names_per_series: 30
  ingestion_rate_mb: 32
  ingestion_burst_size_mb: 64

ruler:
  alertmanager_url: http://localhost:9093

# Disable telemetry — local dev does not need to phone home.
analytics:
  reporting_enabled: false
