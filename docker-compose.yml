# Local services: ClamAV (default), optional self-hosted Infisical (profile `infisical`).
# Security: bind ports below to localhost only on shared machines (e.g. docker compose port
#   "127.0.0.1:3310:3310") — do not expose ClamAV/Infisical UI to untrusted networks.
# Infisical: cp docker/infisical.env.example docker/infisical.env, set secrets, then:
#   docker compose --profile infisical up -d
# UI: http://localhost:8090 — override with INFISICAL_HTTP_PORT

services:
  clamav:
    image: clamav/clamav-debian:1.4
    container_name: contractor-ops-clamav
    restart: unless-stopped
    ports:
      - "${CLAMAV_PORT:-3310}:3310"
    volumes:
      - clamav-db:/var/lib/clamav
    environment:
      CLAMAV_NO_FRESHCLAMD: "false"
      FRESHCLAM_CHECKS: 1
    healthcheck:
      test: ["CMD", "clamdcheck"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

  infisical-backend:
    profiles: [infisical]
    image: infisical/infisical:v0.159.9
    container_name: contractor-ops-infisical-backend
    restart: unless-stopped
    depends_on:
      infisical-db:
        condition: service_healthy
      infisical-redis:
        condition: service_started
    env_file: ./docker/infisical.env
    ports:
      - "${INFISICAL_HTTP_PORT:-8090}:8080"
    environment:
      NODE_ENV: production
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fsS http://127.0.0.1:8080/api/status >/dev/null || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 90s
    networks:
      - infisical

  infisical-redis:
    profiles: [infisical]
    image: redis:7-alpine
    container_name: contractor-ops-infisical-redis
    restart: unless-stopped
    volumes:
      - infisical_redis_data:/data
    networks:
      - infisical

  infisical-db:
    profiles: [infisical]
    image: postgres:14-alpine
    container_name: contractor-ops-infisical-db
    restart: unless-stopped
    env_file: ./docker/infisical.env
    volumes:
      - infisical_pg_data:/var/lib/postgresql/data
    networks:
      - infisical
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U infisical -d infisical"]
      interval: 5s
      timeout: 10s
      retries: 10

networks:
  infisical:

volumes:
  clamav-db:
  infisical_pg_data:
  infisical_redis_data:
